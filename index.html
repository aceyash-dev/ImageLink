<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AceLink - Smart URL Shortener</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdn.lordicon.com/lordicon.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        /* Typography */
        @font-face {
            font-family: 'Google Sans Code';
            src: local('Google Sans Code Bold'), local('GoogleSansCode-Bold');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Google Sans Code';
            src: local('Google Sans Code Regular'), local('GoogleSansCode-Regular');
            font-weight: 400;
        }

        :root {
            --blurple: #5539CC;
            --blurple-light: #7A5FFF;
            --bg-dark: #121212;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --font-code: 'Google Sans Code', 'Consolas', 'Courier New', monospace;
            --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: var(--font-ui);
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Mesh Gradient Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 50%, rgba(85, 57, 204, 0.25), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(122, 95, 255, 0.25), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(85, 57, 204, 0.15), transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        /* Apple Liquid Glass Utility */
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            border-radius: 24px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: var(--font-code);
            font-size: 2.8rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--blurple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-section {
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .icon-wrapper {
            position: absolute;
            top: 14px;
            left: 14px;
            pointer-events: none;
        }

        input[type="url"], input[type="number"], input[type="color"], textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.2rem 1.2rem 1.2rem 3.5rem;
            color: var(--text-main);
            font-family: var(--font-code);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--blurple-light);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(85, 57, 204, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, var(--blurple-light), var(--blurple));
            color: white;
            border: none;
            padding: 1.2rem;
            font-family: var(--font-code);
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(85, 57, 204, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(85, 57, 204, 0.6);
        }

        .history-section h2 {
            font-family: var(--font-code);
            font-size: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .history-card {
            padding: 1.5rem;
            transition: transform 0.3s ease;
        }

        .history-card:hover {
            transform: translateY(-4px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .short-url {
            font-family: var(--font-code);
            color: var(--blurple-light);
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            text-shadow: 0 2px 10px rgba(122, 95, 255, 0.4);
            transition: text-shadow 0.2s ease;
        }

        .short-url:hover {
            text-decoration: underline;
            text-shadow: 0 2px 15px rgba(122, 95, 255, 0.8);
        }

        .original-url {
            color: var(--text-muted);
            font-size: 0.9rem;
            word-break: break-all;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-code);
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-delete:hover {
            background: rgba(255, 70, 70, 0.3);
            border-color: rgba(255, 70, 70, 0.5);
        }

        .markdown-content {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--blurple);
            padding: 1.2rem;
            border-radius: 12px;
            margin-top: 1.2rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .markdown-content p { margin-top: 0; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content a { color: var(--blurple-light); font-weight: bold; }
        .markdown-content code { 
            font-family: var(--font-code);
            background: rgba(255,255,255,0.1); 
            padding: 2px 6px; 
            border-radius: 4px; 
        }

        .empty-state {
            text-align: center;
            font-family: var(--font-code);
            color: var(--text-muted);
            padding: 3rem;
            font-style: italic;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            margin-left: -125px;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            font-family: var(--font-code);
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s, bottom 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Modal for QR Code */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h3 {
            margin-top: 0;
            font-family: var(--font-code);
        }

        #qrCodeCanvas {
            border-radius: 12px;
            margin: 1rem 0;
            background: white; /* Ensure contrast for scanning */
            padding: 10px;
        }

        .qr-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1rem;
            text-align: left;
        }

        .qr-controls label {
            font-family: var(--font-code);
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .qr-controls input[type="number"], .qr-controls input[type="color"] {
            padding: 0.8rem;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <lordicon
                src="https://cdn.lordicon.com/xhebrhsj.json"
                trigger="hover"
                colors="primary:#ffffff,secondary:#7A5FFF"
                style="width:50px;height:50px">
            </lordicon>
            <h1>AceLink</h1>
        </header>

        <section class="input-section liquid-glass">
            <div class="form-group">
                <div class="icon-wrapper">
                    <lordicon
                        src="https://cdn.lordicon.com/zzcjjxew.json"
                        trigger="loop"
                        delay="2000"
                        colors="primary:#7A5FFF,secondary:#ffffff"
                        style="width:24px;height:24px">
                    </lordicon>
                </div>
                <input type="url" id="longUrl" placeholder="Enter long URL (e.g., https://example.com)" required>
            </div>

            <div class="form-group">
                <div class="icon-wrapper">
                    <lordicon
                        src="https://cdn.lordicon.com/puvaffet.json"
                        trigger="hover"
                        colors="primary:#7A5FFF,secondary:#ffffff"
                        style="width:24px;height:24px">
                    </lordicon>
                </div>
                <textarea id="mdNote" placeholder="Markdown note (e.g., **Campaign A**)"></textarea>
            </div>

            <button class="btn-primary" onclick="shortenLink()">
                <lordicon
                    src="https://cdn.lordicon.com/whtfuqlw.json"
                    trigger="hover"
                    colors="primary:#ffffff"
                    style="width:24px;height:24px">
                </lordicon>
                Shorten & Save
            </button>
        </section>

        <section class="history-section">
            <h2>
                <lordicon
                    src="https://cdn.lordicon.com/fpmskzjq.json"
                    trigger="hover"
                    colors="primary:#ffffff,secondary:#7A5FFF"
                    style="width:30px;height:30px">
                </lordicon>
                Recent Links
            </h2>
            <div id="historyList" class="history-list"></div>
        </section>
    </div>

    <div id="toast" class="liquid-glass">Copied to clipboard!</div>

    <div class="modal-overlay" id="qrModal">
        <div class="modal-content liquid-glass">
            <h3>QR Code Generator</h3>
            <canvas id="qrCodeCanvas"></canvas>
            
            <div class="qr-controls">
                <label>Size (px):</label>
                <input type="number" id="qrSize" value="200" min="100" max="1000" onchange="updateQR()">
                
                <label>Color Filter:</label>
                <input type="color" id="qrColor" value="#5539CC" onchange="updateQR()">
            </div>

            <div class="card-actions" style="justify-content: center; margin-top: 15px;">
                <button class="btn-action" onclick="downloadQR()">Download</button>
                <button class="btn-action btn-delete" onclick="closeQRModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = "acelink_history";
        let linkHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentQRUrl = "";
        let qrInstance = null;

        function saveHistory() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(linkHistory));
        }

        async function shortenLink() {
            const urlInput = document.getElementById('longUrl');
            const mdInput = document.getElementById('mdNote');

            let originalUrl = urlInput.value.trim();
            if (!originalUrl) {
                showToast("Please enter a valid URL.");
                return;
            }

            if (!/^https?:\/\//i.test(originalUrl)) {
                originalUrl = 'https://' + originalUrl;
            }

            let shortUrl;

            try {
                // Attempting an API call, fallback to simulated if it fails
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: originalUrl,
                        note: mdInput.value.trim()
                    })
                });

                if (!response.ok) throw new Error("API unavailable");
                const data = await response.json();
                shortUrl = data.shortUrl;
            } catch (error) {
                // Fallback to simulated short link utilizing the ace.ln domain
                const code = Math.random().toString(36).substring(2, 8);
                shortUrl = `https://ace.ln/${code}`;
            }

            linkHistory.unshift({
                id: Date.now().toString(),
                originalUrl,
                shortUrl,
                markdownRaw: mdInput.value.trim() || "*No description provided.*",
                createdAt: new Date().toISOString()
            });

            saveHistory();
            renderHistory();

            urlInput.value = "";
            mdInput.value = "";
            showToast("Link shortened & saved!");
        }

        function deleteLink(id) {
            linkHistory = linkHistory.filter(link => link.id !== id);
            saveHistory();
            renderHistory();
            showToast("Link deleted.");
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("Copied to clipboard!");
            });
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "liquid-glass show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- QR Code Logic ---
        function openQRModal(url) {
            currentQRUrl = url;
            document.getElementById('qrModal').style.display = 'flex';
            updateQR();
        }

        function closeQRModal() {
            document.getElementById('qrModal').style.display = 'none';
        }

        function updateQR() {
            const size = parseInt(document.getElementById('qrSize').value) || 200;
            const color = document.getElementById('qrColor').value || '#5539CC';
            
            if (!qrInstance) {
                qrInstance = new QRious({
                    element: document.getElementById('qrCodeCanvas'),
                    value: currentQRUrl,
                    size: size,
                    foreground: color,
                    level: 'H'
                });
            } else {
                qrInstance.set({
                    value: currentQRUrl,
                    size: size,
                    foreground: color
                });
            }
        }

        function downloadQR() {
            const canvas = document.getElementById('qrCodeCanvas');
            const link = document.createElement('a');
            link.download = 'AceLink-QR.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast("QR Code downloaded!");
        }

        function renderHistory() {
            const container = document.getElementById("historyList");
            container.innerHTML = "";

            if (linkHistory.length === 0) {
                container.innerHTML = '<div class="empty-state liquid-glass">No links shortened yet.</div>';
                return;
            }

            linkHistory.forEach(link => {
                const card = document.createElement("div");
                card.className = "history-card liquid-glass";

                card.innerHTML = `
                    <div class="history-header">
                        <div>
                            <a href="${link.originalUrl}" target="_blank" rel="noopener noreferrer" class="short-url">${link.shortUrl}</a>
                            <div class="original-url">${link.originalUrl}</div>
                        </div>
                    </div>
                    
                    <div class="card-actions">
                        <button class="btn-action" onclick="copyToClipboard('${link.shortUrl}')">
                            <lordicon src="https://cdn.lordicon.com/nocovwne.json" trigger="hover" colors="primary:#ffffff" style="width:16px;height:16px"></lordicon>
                            Copy
                        </button>
                        <button class="btn-action" onclick="openQRModal('${link.shortUrl}')">
                            QR Code
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteLink('${link.id}')">
                            Delete
                        </button>
                    </div>

                    <div class="markdown-content">
                        ${marked.parse(link.markdownRaw)}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Initial render
        renderHistory();
    </script>
</body>
</html>
